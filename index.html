<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Lila Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Calculadora de Precios</h1>
        
        <div class="input-group">
            <label for="tasa">Tasa de Cambio (BS por $):</label>
            <input type="number" id="tasa" placeholder="Ej: 36.50" step="0.01">
        </div>

        <div class="input-group">
            <label for="precioDolar">Precio en Dólares ($):</label>
            <input type="number" id="precioDolar" placeholder="Monto en $" step="0.01">
        </div>

        <button onclick="calcularPrecio()">Calcular Conversión</button>

        <div class="result-card" id="resultadoArea" style="display: none;">
            <h3>Resultado:</h3>
            <div class="result-value">
                <span id="precioBs">0.00</span> <small>BS</small>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
