<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Precios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Calculadora de Precios</h1>
        
        <div class="top-section">
            <div class="input-group">
                <label for="tasa">Tasa de Cambio (BS por $):</label>
                <input type="number" id="tasa" placeholder="Ej: 36.50" step="0.01">
            </div>
            <button onclick="calcularTabla()">Actualizar Precios</button>
        </div>

        <div class="table-container">
            <table id="tablaServicios">
                <thead>
                    <tr>
                        <th>Servicio / Producto</th>
                        <th>Precio ($)</th>
                        <th>Precio (BS)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Lavado Sencillo</td>
                        <td>
                            <div class="input-dolar-wrapper">
                                <span>$</span>
                                <input type="number" class="precio-dolar" value="5.00" step="0.5">
                            </div>
                        </td>
                        <td class="precio-bs">0.00</td>
                    </tr>
                    <tr>
                        <td>Lavado Profundo</td>
                        <td>
                            <div class="input-dolar-wrapper">
                                <span>$</span>
                                <input type="number" class="precio-dolar" value="8.00" step="0.5">
                            </div>
                        </td>
                        <td class="precio-bs">0.00</td>
                    </tr>
                    <tr>
                        <td>Restauración de Gamuza</td>
                        <td>
                            <div class="input-dolar-wrapper">
                                <span>$</span>
                                <input type="number" class="precio-dolar" value="12.00" step="0.5">
                            </div>
                        </td>
                        <td class="precio-bs">0.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
