<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Precios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-card">
        <h2>Calculadora de Precios</h2>
        
        <div class="input-group highlight">
            <label for="tasa">Tasa de Cambio (Bs):</label>
            <input type="number" id="tasa" placeholder="Ej. 36.50" step="0.01" inputmode="decimal">
        </div>

        <div class="divider"></div>

        <div class="conversion-section">
            <div class="input-group">
                <label for="usd">Monto en Dólares ($):</label>
                <input type="number" id="usd" placeholder="0.00" inputmode="decimal">
            </div>
            <div class="result-box">
                <span>Equivale a:</span>
                <span id="resultadoBs" class="result-value">Bs 0.00</span>
            </div>
        </div>

        <div class="divider"></div>

        <div class="conversion-section">
            <div class="input-group">
                <label for="bs">Monto en Bolívares (Bs):</label>
                <input type="number" id="bs" placeholder="0.00" inputmode="decimal">
            </div>
            <div class="result-box">
                <span>Equivale a:</span>
                <span id="resultadoUsd" class="result-value">$ 0.00</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
