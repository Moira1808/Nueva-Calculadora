<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&S Shoe Spa | Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <main class="calculator-container">
        <header class="calc-header">
            <h1>P&S Shoe Spa</h1>
            <p>Calculadora de Servicios</p>
        </header>

        <section class="input-section">
            <label for="tasa">Tasa de Cambio (Bs.):</label>
            <input type="number" id="tasa" placeholder="Ej. 36.50" step="0.01" inputmode="decimal">
        </section>

        <section class="services-section">
            <h2>Nuestros Servicios</h2>
            
            <div class="service-card">
                <span class="service-name">Limpieza Básica ($5)</span>
                <span class="service-price" data-usd="5">Bs. 0.00</span>
            </div>

            <div class="service-card">
                <span class="service-name">Limpieza Profunda ($10)</span>
                <span class="service-price" data-usd="10">Bs. 0.00</span>
            </div>

            <div class="service-card">
                <span class="service-name">Restauración de Color ($15)</span>
                <span class="service-price" data-usd="15">Bs. 0.00</span>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
